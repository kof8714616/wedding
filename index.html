<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 1. 這裡修改的是：瀏覽器分頁上顯示的標題 -->
  <title>查顏觀色 給婚趴踢邀請</title>

  <!-- ✨ 新增：社群分享預覽標題 (解決 LINE/FB 預覽問題) -->
  <meta property="og:title" content="查顏觀色 給婚趴踢邀請">
  <meta property="og:description" content="誠摯邀請您前來參與我們的給婚趴踢！">
  <meta property="og:type" content="website">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ✨ 引入思源黑體作為全站預設 */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

    /* ✨ 讀取上傳到 GitHub 的本地字體檔案 */
    @font-face {
      font-family: 'ChenYuluoyan';
      src: url('./ChenYuluoyan-2.0-Thin.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    /* ✨ 全站預設改為思源黑體 */
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }

    /* ✨ 設定封面字型 */
    .custom-font-en {
      font-family: 'ChenYuluoyan', sans-serif;
    }

    .custom-font-zh {
      font-family: 'ChenYuluoyan', sans-serif;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
  </style>
</head>
<body class="bg-[#FDFBF7] text-stone-800 selection:bg-rose-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [relation, setRelation] = useState("");
      const [tone, setTone] = useState("溫馨感人");
      const [blessing, setBlessing] = useState("");
      const [isGenerating, setIsGenerating] = useState(false);
      const [copySuccess, setCopySuccess] = useState(false);

      const weddingInfo = {
        groom: "顏宏能",
        bride: "查邦貞",
        date: "2026年3月22日星期天",
        // ✨ 時間陣列
        time: [
          "趴踢TIME 11:20",
          "撤退TIME 14:00"
        ],
        venue: "街趣 BLOCK&",
        address: "高雄市鼓山區明倫路496號",
        coverImage: "./cover.jpg", 
        galleryImages: [
          "./gallery-1.jpg",
          "./gallery-2.jpg",
          "./gallery-3.jpg",
          "./gallery-4.jpg"
        ],
        googleFormUrl: "https://forms.gle/eAJWpMw434HG5Ahx9"
      };

      const handleGenerateBlessing = async () => {
        setIsGenerating(true);
        setCopySuccess(false);
        const apiKey = ""; 
        const userRelation = relation.trim() || "親友";
        const promptText = `請為新郎「${weddingInfo.groom}」與新娘「${weddingInfo.bride}」的婚禮寫一段大約 30~50 字的祝福語。我是他們的「${userRelation}」，請用「${tone}」的語氣撰寫。`;
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
          contents: [{ parts: [{ text: promptText }] }],
          systemInstruction: { parts: [{ text: "你是一個婚禮祝福語大師。" }] }
        };

        const fetchWithRetry = async (retries = 5) => {
          const delays = [1000, 2000, 4000, 8000, 16000];
          for (let i = 0; i < retries; i++) {
            try {
              const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              if (!response.ok) throw new Error('API Error');
              const data = await response.json();
              return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (error) {
              if (i === retries - 1) return "祝你們新婚快樂！";
              await new Promise(r => setTimeout(r, delays[i]));
            }
          }
        };

        const resultText = await fetchWithRetry();
        setBlessing(resultText);
        setIsGenerating(false);
      };

      const handleCopy = () => {
        const textArea = document.createElement("textarea");
        textArea.value = blessing;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        setCopySuccess(true);
        setTimeout(() => setCopySuccess(false), 2000);
        document.body.removeChild(textArea);
      };

      const HeartIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-rose-400 mb-8"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
      const ClockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>;
      const CalendarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>;
      const MapPinIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
      const ExternalLinkIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
      const SparklesIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-amber-500"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M7 5H3"/><path d="M21 17v4"/><path d="M23 19h-4"/></svg>;

      return (
        <div className="min-h-screen">
          <section className="relative h-screen w-full flex items-center justify-center overflow-hidden">
            <div className="absolute inset-0">
              <img src={weddingInfo.coverImage} alt="Cover" className="w-full h-full object-cover opacity-80" />
              <div className="absolute inset-0 bg-black/20" />
            </div>
            <div className="relative z-10 text-center text-white px-4 flex flex-col items-center">
              <p className="tracking-widest text-sm md:text-base mb-6 uppercase custom-font-en">Finally!! We do!</p>
              <h1 className="text-5xl md:text-7xl tracking-wider mb-6 flex flex-col md:flex-row items-center gap-4 custom-font-zh">
                <span>{weddingInfo.groom}</span>
                <span className="text-rose-300 mx-2 text-3xl md:text-5xl">&amp;</span>
                <span>{weddingInfo.bride}</span>
              </h1>
              <p className="text-xl md:text-2xl font-light tracking-widest mt-4">{weddingInfo.date}</p>
            </div>
          </section>

          <section className="py-24 px-6 text-center max-w-3xl mx-auto">
            <HeartIcon />
            <h2 className="text-2xl md:text-3xl font-medium text-stone-700 mb-8 tracking-widest">Let's 開趴!!!</h2>
            <div className="leading-loose text-stone-600 space-y-4 tracking-wide">
              <p>沒有長輩!!沒有親戚!!</p>
              <p>只有快變活化石的年輕人</p>
              <p>邀請你來參加我們的『給婚趴踢』</p>
              <p>不要有壓力!!功德隨喜!!!</p>
              <p>來就對了ฅ^•ﻌ•^ฅ </p>
              <p>唯一的缺點就是趴踢可能會烙賽</p>
              <p>請多多包涵 啾咪ヽ(́◕◞౪◟◕‵)ﾉ</p>
              <p>下滑幫我們填表單 霸脫(*´∀`)~♥</p>
            </div>
          </section>

          <section className="py-20 bg-stone-100/50">
            <div className="max-w-4xl mx-auto px-6">
              <h2 className="text-2xl font-medium text-center text-stone-700 mb-16 tracking-widest">Party Time</h2>
              <div className="grid md:grid-cols-3 gap-10 text-center">
                <div className="flex flex-col items-center p-6 bg-white rounded-xl shadow-sm">
                  <div className="w-12 h-12 bg-rose-50 rounded-full flex items-center justify-center text-rose-500 mb-4"><CalendarIcon /></div>
                  <h3 className="font-medium text-lg mb-2">日期</h3>
                  <p className="text-stone-500">{weddingInfo.date}</p>
                </div>
                {/* ✨ 修正後的時間卡片 */}
                <div className="flex flex-col items-center p-6 bg-white rounded-xl shadow-sm">
                  <div className="w-12 h-12 bg-rose-50 rounded-full flex items-center justify-center text-rose-500 mb-4"><ClockIcon /></div>
                  <h3 className="font-medium text-lg mb-2">時間</h3>
                  <div className="text-stone-500 flex flex-col gap-1">
                    {weddingInfo.time.map((t, i) => (
                      <p key={i} className="whitespace-nowrap">{t}</p>
                    ))}
                  </div>
                </div>
                <div className="flex flex-col items-center p-6 bg-white rounded-xl shadow-sm">
                  <div className="w-12 h-12 bg-rose-50 rounded-full flex items-center justify-center text-rose-500 mb-4"><MapPinIcon /></div>
                  <h3 className="font-medium text-lg mb-2">地點</h3>
                  <p className="text-stone-500 mb-1 font-medium">{weddingInfo.venue}</p>
                  <p className="text-stone-400 text-sm">{weddingInfo.address}</p>
                </div>
              </div>
            </div>
          </section>

          {/* 相簿、AI、表單其餘部分保持不變 */}
          <section className="py-24 px-4 max-w-6xl mx-auto">
            <h2 className="text-2xl font-medium text-center text-stone-700 mb-16 tracking-widest">我們兩個</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              {weddingInfo.galleryImages.map((img, index) => (
                <div key={index} className="aspect-[3/4] overflow-hidden rounded-lg">
                  <img src={img} alt={`Gallery ${index + 1}`} className="w-full h-full object-cover hover:scale-105 transition-transform duration-700 cursor-pointer" />
                </div>
              ))}
            </div>
          </section>

          <section className="py-20 px-6 bg-stone-50 border-t border-b border-stone-200">
            <div className="max-w-2xl mx-auto text-center">
              <div className="flex justify-center items-center gap-2 mb-4"><SparklesIcon /><h2 className="text-2xl font-medium text-stone-700 tracking-widest">AI 專屬祝福語產生器</h2><SparklesIcon /></div>
              <div className="bg-white p-8 rounded-2xl shadow-sm border border-stone-100 text-left mt-8">
                <div className="grid md:grid-cols-2 gap-6 mb-6">
                  <input type="text" placeholder="您與新人的關係" value={relation} onChange={(e) => setRelation(e.target.value)} className="w-full px-4 py-2 border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-200" />
                  <select value={tone} onChange={(e) => setTone(e.target.value)} className="w-full px-4 py-2 border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-200">
                    <option value="溫馨感人">溫馨感人</option><option value="幽默風趣">幽默風趣</option><option value="真摯簡潔">真摯簡潔</option>
                  </select>
                </div>
                <button onClick={handleGenerateBlessing} disabled={isGenerating} className="w-full bg-rose-400 text-white font-medium py-3 rounded-lg hover:bg-rose-500 transition-colors disabled:opacity-50">
                  {isGenerating ? "✨ 產生中..." : "✨ 幫我產生祝福語"}
                </button>
                {blessing && <div className="mt-6 p-4 bg-stone-50 rounded-lg border-l-4 border-rose-300 italic"><p>「{blessing}」</p><button onClick={handleCopy} className="mt-2 text-xs text-stone-400 hover:text-stone-600 underline">{copySuccess ? "已複製！" : "複製祝福語"}</button></div>}
              </div>
            </div>
          </section>

          <section className="py-24 bg-stone-800 text-stone-50 text-center px-6">
            <h2 className="text-2xl font-medium mb-12 tracking-widest">填填表單</h2>
            <div className="max-w-xl mx-auto bg-stone-700/50 p-10 rounded-xl border border-stone-600">
              <p className="text-stone-300 mb-8 leading-relaxed">為了讓我們可以成功開趴，請填寫出席單！</p>
              <a href={weddingInfo.googleFormUrl} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-stone-100 text-stone-800 font-medium px-8 py-4 rounded-lg hover:bg-white transition-colors">前往填寫表單 <ExternalLinkIcon /></a>
            </div>
          </section>

          <footer className="bg-stone-900 text-stone-500 text-center py-8 text-sm"><p>&copy; 2026 {weddingInfo.groom} &amp; {weddingInfo.bride}. All rights reserved.</p></footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
